<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=10, minimum-scale=0.01, user-scalable=yes">
    <link rel="stylesheet" href="Treant.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #fafafa; }
        #tree-container { width: 100%; height: 100%; }
        /* Style inspiré du site web */
        .nodeExample1 {
            padding: 8px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 2px solid #6200EE;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100px; /* Force width */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box; /* Includes padding in the width calculation to be safe */
            transition: all 0.2s ease-in-out;
        }
        .nodeExample1 img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 4px;
            float: none !important; /* Override Treant.css float */
            transition: transform 0.2s ease-in-out;
        }
        .nodeExample1 p {
            font-family: sans-serif;
            font-size: 12px;
            font-weight: bold;
            margin: 0;
            color: #333;
            width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word; /* Ensure large unbroken text wraps */
            white-space: normal;
        }
        
        /* Style pour le noeud sélectionné */
        .nodeExample1.node-selected {
            border: 4px solid #000000 !important;
            background-color: #FFF3E0 !important;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            transform: scale(1.05);
            z-index: 10;
        }
        .nodeExample1.node-selected img {
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <div id="tree-container"></div>
    <script src="jquery.min.js"></script>
    <script src="raphael.js"></script>
    <script src="Treant.js"></script>
    <script>
        // Désactiver le menu contextuel natif pour les futurs appuis longs
        window.oncontextmenu = function(event) {
            event.preventDefault();
            event.stopPropagation();
            return false;
        };

        // Variables globales
        let isListenerAttached = false;
        let globalSelectedNodeId = null;
        let isReadOnlyMode = false;
        let currentTreeId = -1;

        // Fonction appelée depuis Kotlin via WebView.evaluateJavascript
        function renderTreeBase64(base64Payload, selectedNodeId, readOnly, treeId) {
            try {
                isReadOnlyMode = !!readOnly;
                currentTreeId = treeId || -1;
                // On réinitialise systématiquement pour éviter de garder une sélection d'un arbre précédent
                globalSelectedNodeId = selectedNodeId || null; 
                
                const jsonString = decodeURIComponent(escape(window.atob(base64Payload)));
                const rootData = JSON.parse(jsonString);
                
                var chart_config = {
                    chart: {
                        container: "#tree-container",
                        levelSeparation: 45,
                        siblingSeparation: 30,
                        subTeeSeparation: 30,
                        nodeAlign: "BOTTOM",
                        connectors: {
                            type: "step",
                            style: {
                                "stroke-width": 2,
                                "stroke": "#999"
                            }
                        }
                    },
                    nodeStructure: buildTreantNode(rootData.root_node || (rootData.roots ? rootData.roots[0] : rootData), "r")
                };
                
                document.getElementById("tree-container").innerHTML = ""; // Clean before re-render
                new Treant(chart_config);
                
                // Nettoyage systématique des anciennes sélections visuelles au chargement
                setTimeout(() => {
                    $('.node-selected').removeClass('node-selected');
                    
                    if (globalSelectedNodeId) {
                        let nodeToSelect = document.getElementById('node-' + globalSelectedNodeId);
                        if (nodeToSelect) {
                            $(nodeToSelect).addClass('node-selected');
                            // Centrer la vue sur le noeud
                            nodeToSelect.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                        }
                    }
                }, 300); // Petit délai pour laisser Treant placer les divs

                if (!isListenerAttached) {
                    // Active le pont Javascript-Kotlin pour la navigation
                    document.addEventListener('click', function(e) {
                        if (isReadOnlyMode) return;
                        let target = e.target.closest('.nodeExample1');
                        if (target && target.id && target.id.startsWith('node-')) {
                            let uniqueId = target.id.replace('node-', '');
                            globalSelectedNodeId = uniqueId;

                            // Nettoyer TOUTES les sélections précédentes (y compris les fantômes potentiels)
                            $('.node-selected').removeClass('node-selected');
                            
                            // Appliquer la nouvelle sélection locale
                            $(target).addClass('node-selected');
                            console.log("Treant: Selection updated to " + uniqueId);

                            // Appeler Kotlin
                            if (window.AndroidBridge && typeof window.AndroidBridge.onNodeSelected === 'function') {
                                window.AndroidBridge.onNodeSelected(uniqueId);
                            }
                        }
                    });
                    isListenerAttached = true;
                }
            } catch (e) {
                console.error("Erreur de parsing de l'arbre", e);
                document.getElementById('tree-container').innerHTML = "<h2>Erreur de Chargement</h2><p>" + e + "</p>";
            }
        }
        
        function buildTreantNode(node, path) {
            if (!node) return null;
            
            // Chemin par défaut pour la racine
            let currentPath = path || "r";
            
            let rawId = node.node_id || node.id || 'unsaved';
            let uniqueId = currentTreeId + "_" + rawId + "_" + currentPath;
            
            let treantNode = {
                HTMLclass: 'nodeExample1',
                HTMLid: 'node-' + uniqueId,
                text: { name: node.label || node.text || node.name || '---' }
            };
            
            if (node.image_url || node.image || node.url) {
                treantNode.image = node.image_url || node.image || node.url;
            }
            
            if (node.children && node.children.length > 0) {
                treantNode.children = node.children.map((child, i) => buildTreantNode(child, currentPath + "_" + i)).filter(c => c != null);
            }
            
            return treantNode;
        }
    </script>
</body>
</html>
