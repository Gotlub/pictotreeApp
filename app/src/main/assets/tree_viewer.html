<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=10, minimum-scale=0.01, user-scalable=yes">
    <link rel="stylesheet" href="Treant.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #fafafa; }
        #tree-container { width: 100%; height: 100%; }
        /* Style inspiré du site web */
        .nodeExample1 {
            padding: 8px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 2px solid #6200EE;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 80px;
        }
        .nodeExample1 img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .nodeExample1 p {
            font-family: sans-serif;
            font-size: 12px;
            font-weight: bold;
            margin: 0;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="tree-container"></div>
    <script src="jquery.min.js"></script>
    <script src="raphael.js"></script>
    <script src="Treant.js"></script>
    <script>
        // Cette fonction sera appelée depuis Kotlin via WebView.evaluateJavascript
        function renderTreeBase64(base64Payload) {
            try {
                const jsonString = decodeURIComponent(escape(window.atob(base64Payload)));
                const rootData = JSON.parse(jsonString);
                
                var chart_config = {
                    chart: {
                        container: "#tree-container",
                        levelSeparation: 45,
                        siblingSeparation: 30,
                        subTeeSeparation: 30,
                        nodeAlign: "BOTTOM",
                        connectors: {
                            type: "step",
                            style: {
                                "stroke-width": 2,
                                "stroke": "#999"
                            }
                        }
                    },
                    nodeStructure: buildTreantNode(rootData.root_node)
                };
                
                new Treant(chart_config);
            } catch (e) {
                console.error("Erreur de parsing de l'arbre", e);
                document.getElementById('tree-container').innerHTML = "<h2>Erreur de Chargement JSON</h2><p>" + e + "</p>";
            }
        }
        
        function buildTreantNode(node) {
            if (!node) return null;
            
            let treantNode = {
                HTMLclass: 'nodeExample1',
                text: { name: node.label || '---' }
            };
            
            if (node.image_url) {
                // By providing the image natively, Treant will render it securely without innerHTML.
                treantNode.image = node.image_url;
            }
            
            if (node.children && node.children.length > 0) {
                treantNode.children = node.children.map(child => buildTreantNode(child)).filter(c => c != null);
            }
            
            return treantNode;
        }
    </script>
</body>
</html>
