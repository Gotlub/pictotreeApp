<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10, minimum-scale=0.1, user-scalable=yes">
    <link rel="stylesheet" href="Treant.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: auto; background-color: #fafafa; }
        #tree-container { 
            display: inline-block;
            min-width: 100%;
            min-height: 100%;
            overflow: auto;
        }

        .Treant {
            /* On force les marges EXTERNES de l'arbre généré.
               Le !important empêche le JS de Treant d'écraser notre règle */
            margin-bottom: 150px !important; /* Espace pour tes boutons en bas */
            margin-top: 150px !important;     /* Espace en haut */
            margin-left: 100px !important;    /* Espace à gauche */
            margin-right: 100px !important;   /* Espace à droite */
            position: relative;
        }
        .nodeExample1 {
            padding: 8px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 2px solid #6200EE;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }
        .nodeExample1 img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 4px;
            float: none !important;
        }
        .nodeExample1 p {
            font-family: sans-serif;
            font-size: 12px;
            font-weight: bold;
            margin: 0;
            color: #333;
            width: 100%;
            word-wrap: break-word;
        }
        .nodeExample1.node-selected {
            border: 4px solid #000000 !important;
            background-color: #FFF3E0 !important;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="tree-container"></div>
    <script src="jquery.min.js"></script>
    <script src="raphael.js"></script>
    <script src="Treant.js"></script>
    <script>
        window.oncontextmenu = function(event) { event.preventDefault(); return false; };

        let isListenerAttached = false;
        let globalSelectedNodeId = null;
        let isReadOnlyMode = false;
        let currentTreeId = -1;

        function renderTreeBase64(base64Payload, selectedNodeId, readOnly, treeId, orientation) {
            try {
                isReadOnlyMode = !!readOnly;
                currentTreeId = treeId || -1;
                globalSelectedNodeId = selectedNodeId || null; 
                
                const jsonString = decodeURIComponent(escape(window.atob(base64Payload)));
                const rootData = JSON.parse(jsonString);
                
                var chart_config = {
                    chart: {
                        container: "#tree-container",
                        rootOrientation: orientation || "NORTH",
                        levelSeparation: 45,
                        siblingSeparation: 30,
                        subTeeSeparation: 30,
                        nodeAlign: "BOTTOM",
                        // PADDING NORMALISÉ : Réduit par 3 pour éviter les bords inutiles
                        padding: 40,
                        connectors: { type: "step", style: { "stroke-width": 2, "stroke": "#999" } }
                    },
                    nodeStructure: buildTreantNode(rootData.root_node || (rootData.roots ? rootData.roots[0] : rootData), "r")
                };
                
                document.getElementById("tree-container").innerHTML = ""; 
                new Treant(chart_config);
                
                // Centrage rapide
                setTimeout(() => {
                    if (globalSelectedNodeId) {
                        let node = document.getElementById('node-' + globalSelectedNodeId);
                        if (node) {
                            $(node).addClass('node-selected');
                            node.scrollIntoView({ behavior: 'auto', block: 'center', inline: 'center' });
                            return;
                        }
                    }
                    let allNodes = document.querySelectorAll('.nodeExample1');
                    if (allNodes.length > 0) {
                        allNodes[0].scrollIntoView({ behavior: 'auto', block: 'center', inline: 'center' });
                    }
                }, 150);

                if (!isListenerAttached) {
                    document.addEventListener('click', function(e) {
                        if (isReadOnlyMode) return;
                        let target = e.target.closest('.nodeExample1');
                        if (target && target.id && target.id.startsWith('node-')) {
                            let uniqueId = target.id.replace('node-', '');
                            globalSelectedNodeId = uniqueId;
                            $('.node-selected').removeClass('node-selected');
                            $(target).addClass('node-selected');
                            let imgElement = target.querySelector('img');
                            if (window.AndroidBridge) window.AndroidBridge.onNodeSelected(uniqueId, imgElement ? imgElement.src : null);
                        }
                    });
                    isListenerAttached = true;
                }
            } catch (e) { console.error(e); }
        }
        
        function buildTreantNode(node, path) {
            if (!node) return null;
            let currentPath = path || "r";
            let rawId = node.node_id || node.id || 'unsaved';
            let uniqueId = currentTreeId + "_" + rawId + "_" + currentPath;
            let treantNode = {
                HTMLclass: 'nodeExample1',
                HTMLid: 'node-' + uniqueId,
                text: { name: node.label || node.text || node.name || '---' }
            };
            if (node.image_url || node.image || node.url) treantNode.image = node.image_url || node.image || node.url;
            if (node.children && node.children.length > 0) {
                treantNode.children = node.children.map((child, i) => buildTreantNode(child, currentPath + "_" + i)).filter(c => c != null);
            }
            return treantNode;
        }
    </script>
</body>
</html>
